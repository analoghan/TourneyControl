version: '3.8'

services:
  tournament-control:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tournament-control
    ports:
      - "3001:3001"
    volumes:
      # Persist the SQLite database
      - tournament-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/tournaments"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  tournament-data:
    driver: local
